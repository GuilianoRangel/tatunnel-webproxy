version: '3.8'

services:
  tatunnel-server:
    build: .
    container_name: tatunnel-server
    restart: unless-stopped
    environment:
      - PORT=8080
      - BASE_DOMAIN=${BASE_DOMAIN:-tatunnel.guiliano.com.br}
    networks:
      - dokploy-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=dokploy-network'

      # Router principal do tatunnel
      - 'traefik.http.routers.tatunnel.rule=Host(`tatunnel.guiliano.com.br`) || HostRegexp(`^[a-zA-Z0-9-]+\.tatunnel\.guiliano\.com\.br$`)'
      - 'traefik.http.routers.tatunnel.entrypoints=websecure'
      - 'traefik.http.routers.tatunnel.tls=true'
      - 'traefik.http.routers.tatunnel.tls.certresolver=letsencrypt-dns'
      - 'traefik.http.routers.tatunnel.priority=100'

      # Certificado wildcard
      - 'traefik.http.routers.tatunnel.tls.domains[0].main=tatunnel.guiliano.com.br'
      - 'traefik.http.routers.tatunnel.tls.domains[0].sans=*.tatunnel.guiliano.com.br'

      # Headers para aplicações atrás do tatunnel, incluindo Dokploy
      - 'traefik.http.routers.tatunnel.middlewares=tatunnel-headers'
      - 'traefik.http.middlewares.tatunnel-headers.headers.customrequestheaders.X-Forwarded-Proto=https'
      - 'traefik.http.middlewares.tatunnel-headers.headers.customrequestheaders.X-Forwarded-Port=443'
      - 'traefik.http.middlewares.tatunnel-headers.headers.customrequestheaders.X-Forwarded-Ssl=on'

      # Serviço interno do tatunnel
      - 'traefik.http.routers.tatunnel.service=tatunnel'
      - 'traefik.http.services.tatunnel.loadbalancer.server.port=8080'

networks:
  dokploy-network:
    external: true
