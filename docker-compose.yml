version: '3.8'

services:
  tatunnel-server:
    build: .
    container_name: tatunnel-server
    restart: unless-stopped
    environment:
      - PORT=8080
      - BASE_DOMAIN=${BASE_DOMAIN:-tatunnel.guiliano.com.br}
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Router para o domínio principal
      - "traefik.http.routers.tatunnel.rule=Host(`${BASE_DOMAIN:-tatunnel.guiliano.com.br}`)"
      - "traefik.http.routers.tatunnel.entrypoints=websecure"
      - "traefik.http.routers.tatunnel.tls.certresolver=letsencrypt"
      # Router dedicado para os subdomínios (Wildcard)
      - "traefik.http.routers.tatunnel-wild.rule=Host(`*.${BASE_DOMAIN:-tatunnel.guiliano.com.br}`)"
      - "traefik.http.routers.tatunnel-wild.entrypoints=websecure"
      - "traefik.http.routers.tatunnel-wild.tls=true"
      - "traefik.http.services.tatunnel.loadbalancer.server.port=8080"

networks:
  dokploy-network:
    external: true
